name: CI

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce DCO sign-off
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            before="${{ github.event.before }}"
            if [[ -z "${before}" || "${before}" == "0000000000000000000000000000000000000000" ]]; then
              range="${{ github.sha }}"
            else
              range="${before}..${{ github.sha }}"
            fi
          fi

          commits="$(git rev-list "${range}" || true)"
          if [[ -z "${commits}" ]]; then
            commits="${{ github.sha }}"
          fi

          missing=0
          while read -r commit; do
            [[ -z "${commit}" ]] && continue
            if ! git log -1 --pretty=%B "${commit}" | grep -qi '^Signed-off-by:'; then
              echo "Missing Signed-off-by trailer in commit ${commit}"
              missing=1
            fi
          done <<< "${commits}"

          if [[ "${missing}" -ne 0 ]]; then
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Docs consistency
        run: npm run docs:check

      - name: Docs sync parity (omegax-docs)
        run: npm run docs:sync:check

      - name: Dry-run package
        run: npm pack --dry-run

      - name: Security audit (prod dependencies)
        run: npm audit --omit=dev --audit-level=moderate
