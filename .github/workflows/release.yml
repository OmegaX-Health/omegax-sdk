name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-production
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        # actions/checkout@v5 as of 2026-04-27.
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Verify release tag is on main
        shell: bash
        run: |
          set -euo pipefail
          tag_commit="$(git rev-parse HEAD)"
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "${tag_commit}" origin/main; then
            echo "Release tag commit ${tag_commit} is not reachable from origin/main."
            exit 1
          fi

      - name: Setup Node.js
        # actions/setup-node@v5 as of 2026-04-27.
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Docs consistency
        run: npm run docs:check

      - name: Docs sync parity (strict)
        run: npm run docs:sync:check:strict

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));const tag=process.env.TAG_NAME.replace(/^v/,'');if(pkg.version!==tag){console.error(`Tag ${tag} does not match package.json version ${pkg.version}`);process.exit(1);}console.log(`Tag ${tag} matches package.json version`);"

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
