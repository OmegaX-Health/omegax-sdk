name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      # v5 runs on the current GitHub-hosted JavaScript runtime and avoids the Node 20 deprecation warning.
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Docs consistency
        run: npm run docs:check

      - name: Docs sync parity (strict)
        run: npm run docs:sync:check:strict

      - name: Validate tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('package.json','utf8'));const tag=process.env.TAG_NAME.replace(/^v/,'');if(pkg.version!==tag){console.error(`Tag ${tag} does not match package.json version ${pkg.version}`);process.exit(1);}console.log(`Tag ${tag} matches package.json version`);"

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
