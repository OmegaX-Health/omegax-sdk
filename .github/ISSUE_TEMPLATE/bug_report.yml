name: Bug report
description: Report a reproducible SDK bug
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.
  - type: input
    id: version
    attributes:
      label: SDK version
      description: Published package version (for example, 0.5.0)
      placeholder: 0.5.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: '20.x'
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce the issue
      placeholder: |
        1. Install package...
        2. Run code...
        3. Observe error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / logs
    validations:
      required: true
